<svg width="200" height="50" viewBox="0 0 200 50" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Hexagon icon (40x40) -->
  <polygon 
    points="20,2 37,11.5 37,30.5 20,40 3,30.5 3,11.5"
    stroke="#06b6d4" stroke-width="1.5" fill="none" opacity="0.9"
    filter="url(#glow)"
  />
  <polygon 
    points="20,8 32,15 32,27 20,34 8,27 8,15"
    stroke="#06b6d4" stroke-width="0.8" fill="none" opacity="0.4"
  />
  
  <!-- Energy lines -->
  <line x1="20" y1="2"  x2="20" y2="17" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <line x1="20" y1="25" x2="20" y2="40" stroke="#06b6d4" stroke-width="1" opacity="0.5"/>
  <line x1="3"  y1="11.5" x2="13" y2="17.5" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="37" y1="11.5" x2="27" y2="17.5" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="3"  y1="30.5" x2="13" y2="24.5" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  <line x1="37" y1="30.5" x2="27" y2="24.5" stroke="#06b6d4" stroke-width="1" opacity="0.4"/>
  
  <!-- Arc reactor rings -->
  <circle cx="20" cy="21" r="7.5" stroke="#06b6d4" stroke-width="1" fill="none" opacity="0.6" filter="url(#glow)"/>
  <circle cx="20" cy="21" r="4.5" stroke="#06b6d4" stroke-width="0.8" fill="none" opacity="0.4"/>
  <!-- Core -->
  <circle cx="20" cy="21" r="3" fill="#06b6d4" opacity="0.9" filter="url(#glow)"/>
  <circle cx="20" cy="21" r="1.8" fill="white" opacity="0.9"/>
  
  <!-- Vertex dots -->
  <circle cx="20" cy="2"   r="1.2" fill="#06b6d4" opacity="0.9"/>
  <circle cx="37" cy="11.5" r="1" fill="#06b6d4" opacity="0.7"/>
  <circle cx="37" cy="30.5" r="1" fill="#06b6d4" opacity="0.7"/>
  <circle cx="20" cy="40"  r="1.2" fill="#06b6d4" opacity="0.9"/>
  <circle cx="3"  cy="30.5" r="1" fill="#06b6d4" opacity="0.7"/>
  <circle cx="3"  cy="11.5" r="1" fill="#06b6d4" opacity="0.7"/>
  
  <!-- STARK text -->
  <text x="48" y="26"
    font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif"
    font-weight="900"
    font-size="22"
    letter-spacing="4"
    fill="#22d3ee"
    filter="url(#glow)"
  >STARK</text>
  
  <!-- .NET text -->
  <text x="48" y="38"
    font-family="'Segoe UI', 'SF Pro Display', -apple-system, sans-serif"
    font-weight="400"
    font-size="10"
    letter-spacing="6"
    fill="#06b6d4"
    opacity="0.8"
  >.NET</text>
  
  <!-- Separator line -->
  <line x1="44" y1="5" x2="44" y2="45" stroke="#06b6d4" stroke-width="0.5" opacity="0.3"/>
</svg>
